services:
  - type: web
    name: codeguard-webhook-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn agent.webhook_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
